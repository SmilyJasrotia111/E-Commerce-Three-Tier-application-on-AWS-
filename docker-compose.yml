services:
  mysql:
    image: mysql:8.4
    container_name: ecommerce-mart-mysql
    environment:
      MYSQL_DATABASE: ecommerce_mart
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ecommerce-mart-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DB_HOST: mysql
      DB_NAME: ecommerce_mart
      DB_USER: appuser
      DB_PASSWORD: apppass
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: ecommerce-mart-frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"

volumes:
  mysql-data:
